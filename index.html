            <input id={f.id} type={f.tp} value={f.v} onChange={e=>f.fn(e.target.value)} placeholder={f.ph}
              onKeyDown={e=>{if(e.key==="Enter"){if(f.nx)document.getElementById(f.nx)?.focus();else doLogin();}}}
              style={{width:"100%",padding:"13px 16px",background:"rgba(255,255,255,.08)",border:"1.5px solid rgba(255,255,255,.15)",borderRadius:14,color:"white",fontSize:15,fontFamily:"inherit",outline:"none",boxSizing:"border-box",direction:"rtl"}}/>
          </div>
        ))}
        {er&&<div style={{color:"#ff6b6b",fontSize:13,textAlign:"center",marginBottom:12}}>⚠️ {er}</div>}
        <button onClick={doLogin} style={{width:"100%",padding:14,background:"linear-gradient(135deg,#2BBFB3,#1a9990)",border:"none",borderRadius:14,color:"white",fontSize:16,fontWeight:800,fontFamily:"inherit",cursor:"pointer",boxShadow:"0 8px 24px rgba(43,191,179,.35)"}}>دخول ←</button>
      </div>
    );
    return(
      <div dir="rtl" style={{minHeight:"100vh",background:"linear-gradient(160deg,#0d2233,#0f3040)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"Tajawal,Arial,sans-serif"}}>
        {mob?(card):(
          {card}
        )}
      </div>
    );
  }

  // ── MAIN ──
  if(isMob){
    return(
      <div dir="rtl" style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#0d0d1a",fontFamily:"Tajawal,Arial,sans-serif",padding:"20px 0",position:"relative"}}>
        {tst&&<div style={{position:"fixed",bottom:"calc(50% - 380px)",left:"50%",transform:"translateX(-50%)",background:s.sf,border:`1px solid ${s.bd}`,borderRadius:14,padding:"12px 20px",boxShadow:"0 8px 32px rgba(0,0,0,.25)",display:"flex",alignItems:"center",gap:10,zIndex:9999,whiteSpace:"nowrap"}}><span style={{fontSize:18}}>{tst.icon}</span><span style={{fontSize:14,fontWeight:600}}>{tst.text}</span></div>}
        {ach&&<div style={{position:"fixed",top:60,left:"50%",transform:"translateX(-50%)",background:"linear-gradient(135deg,#2BBFB3,#7BC67A)",borderRadius:16,padding:"12px 20px",display:"flex",alignItems:"center",gap:10,zIndex:9999,boxShadow:"0 8px 32px rgba(0,0,0,.3)",color:"white"}}><span style={{fontSize:20}}>{ach.i}</span><div><div style={{fontSize:10,opacity:.8}}>إنجاز!</div><div style={{fontSize:13,fontWeight:700}}>{ach.n}</div></div><span style={{fontSize:12}}>{ach.x}</span></div>}
        <button onClick={()=>setForceMob(false)} style={{position:"fixed",top:12,left:12,zIndex:9998,background:"rgba(43,191,179,.2)",border:"1px solid rgba(43,191,179,.4)",borderRadius:10,padding:"6px 14px",fontSize:12,cursor:"pointer",color:"#2BBFB3",fontFamily:"inherit",fontWeight:700,display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:16}}>💻</span><span>لابتوب</span>
        </button>
        <div style={{width:390,height:844,background:s.bg,borderRadius:50,border:"12px solid #111",boxShadow:"0 0 0 3px #333,0 0 0 4px #222,0 40px 100px rgba(0,0,0,.8)",overflow:"hidden",display:"flex",flexDirection:"column",position:"relative",flexShrink:0}}>
          <div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:130,height:36,background:"#111",borderRadius:"0 0 22px 22px",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
            <div style={{width:10,height:10,borderRadius:"50%",background:"#1a1a1a",border:"2px solid #2a2a2a"}}/>
            <div style={{width:56,height:6,borderRadius:3,background:"#1a1a1a",border:"1px solid #2a2a2a"}}/>
          </div>
          <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",marginTop:36}}>
            <PageContent/>
          </div>
          <BottomNav/>
          <div style={{background:s.bg,padding:"8px 0 6px",display:"flex",justifyContent:"center"}}>
            <div style={{width:130,height:5,borderRadius:3,background:s.bd}}/>
          </div>
        </div>
        <style>{`@keyframes b0{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}@keyframes b1{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}@keyframes b2{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}`}</style>
      </div>
    );
  }

  // Desktop layout
  return(
    <div dir="rtl" style={{height:"100vh",display:"flex",background:s.bg,fontFamily:"Tajawal,Arial,sans-serif",color:s.tx,overflow:"hidden"}}>
      <button onClick={()=>setForceMob(true)} title="وضع الجوال" style={{position:"fixed",top:8,left:8,zIndex:9998,background:"rgba(43,191,179,.15)",border:"1px solid rgba(43,191,179,.3)",borderRadius:10,padding:"6px 10px",fontSize:12,cursor:"pointer",color:"#2BBFB3",fontFamily:"inherit",fontWeight:700}} style='font-size:16px'>📱 iPhone</button>
      {tst&&<div style={{position:"fixed",bottom:40,left:"50%",transform:"translateX(-50%)",background:s.sf,border:`1px solid ${s.bd}`,borderRadius:14,padding:"12px 20px",boxShadow:"0 8px 32px rgba(0,0,0,.25)",display:"flex",alignItems:"center",gap:10,zIndex:9999,whiteSpace:"nowrap"}}><span style={{fontSize:18}}>{tst.icon}</span><span style={{fontSize:14,fontWeight:600}}>{tst.text}</span></div>}
      {ach&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:"linear-gradient(135deg,#2BBFB3,#7BC67A)",borderRadius:16,padding:"12px 20px",display:"flex",alignItems:"center",gap:10,zIndex:9999,boxShadow:"0 8px 32px rgba(0,0,0,.3)",color:"white"}}><span style={{fontSize:20}}>{ach.i}</span><div><div style={{fontSize:10,opacity:.8}}>إنجاز!</div><div style={{fontSize:13,fontWeight:700}}>{ach.n}</div></div><span style={{fontSize:12}}>{ach.x}</span></div>}
      <SideNav/>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <PageContent/>
      </div>
      <style>{`@keyframes b0{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}@keyframes b1{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}@keyframes b2{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}`}</style>
    </div>
  );

  function ansQ(i){
    if(qsel!==null)return;setQsel(i);
    const ok=i===QUIZ[qi].c;if(ok)setQs(v=>v+1);
    setTimeout(()=>{
      const nx=qi+1;
      if(nx<QUIZ.length){setQi(nx);setQsel(null);}
      else{
        const sc=ok?qs+1:qs,pct=sc/QUIZ.length;
        let lv,em,dc;
        if(pct<=.4){lv="مبتدئ";em="🔰";dc="لا تقلق! سنبدأ معك من الأساسيات بطريقة ممتعة.";}
        else if(pct<=.7){lv="متوسط";em="⚙️";dc="ممتاز! لديك قاعدة جيدة. سنطور مهاراتك.";}
        else{lv="متقدم";em="🚀";dc="رائع! مستواك متقدم. سنصقل مهاراتك بأحدث التقنيات.";}
        setRes({level:lv,emoji:em,desc:dc});aXp(100);sA("🎯","المختبر","+100 XP");go("result");
      }
    },900);
  }
  function cmpStep(i){
    const p=pr[ls]||0;if(i!==p)return;
    setPr(prev=>({...prev,[ls]:p+1}));aXp(20);sT2("✅","رائع! أحسنت!");
    if(p+1>=LESSONS[ls].steps.length)setTimeout(()=>sA("📚","درس مكتمل","+20 XP"),900);
  }
  function sndC(txt){
    const msg=txt||ci.trim();if(!msg)return;
    setCi("");setMsgs(m=>[...m,{ai:false,text:msg}]);setTyp(true);
    const k=msg.toLowerCase();
    let rsp=FB[Math.floor(Math.random()*FB.length)];
    for(const {k:ks,r} of KB){if(ks.some(key=>k.includes(key))){rsp=r;break;}}
    setTimeout(()=>{setTyp(false);setMsgs(m=>[...m,{ai:true,text:rsp}]);},1200);
  }
  function clkM(it,tp){
    if(mdn.includes(it.term))return;
    if(!msel){setMsel({item:it,tp});return;}
    if(msel.tp===tp){setMsel({item:it,tp});return;}
    if(msel.item.term===it.term){
      setMdn(d=>[...d,it.term]);setMsel(null);aXp(15);
      if(mdn.length+1>=MATCH.length)sA("🔗","المطابق","+60 XP");
    }else{
      setMwr([tp==="term"?it.term+"_t":it.term+"_d",msel.tp==="term"?msel.item.term+"_t":msel.item.term+"_d"]);
      setTimeout(()=>{setMwr([]);setMsel(null);},600);
    }
  }
  function stSp(){
    if(sptm.current)return;
    sptm.current=setInterval(()=>setSpt(t=>{if(t<=1){clearInterval(sptm.current);sptm.current=null;setSpdn(true);return 0;}return t-1;}),1000);
  }
  function chkSp(){
    if(!sptm.current)stSp();
    const ok=spq[spi%spq.length].a;
    if(spin.trim().toLowerCase()===ok.toLowerCase()){setSps(v=>v+10);setSpfb("✅ صحيح!");aXp(5);}
    else setSpfb(`❌ الجواب: ${ok}`);
    setSpin("");setSpi(i=>i+1);setTimeout(()=>setSpfb(""),700);
  }
  function ansFl(i){
    if(fa!==null)return;setFa(i);
    if(i===FILL[fi].c){sT2("✅","إجابة صحيحة!");aXp(15);}
    else sT2("❌",`الجواب: ${FILL[fi].opts[FILL[fi].c]}`);
    setTimeout(()=>{if(fi+1>=FILL.length)setFdn(true);else{setFi(f=>f+1);setFa(null);}},1000);
  }
  function gsW(){
    if(!win.trim()||wtr.length>=6)return;
    const g=win.trim().toUpperCase();
    setWtr(t=>[...t,g]);setWin("");
    if(g===WORDS[wi].word){setWwn(true);aXp(30);sA("💭","خمّان الكلمة","+30 XP");}
  }
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
